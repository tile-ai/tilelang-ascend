# TileLang-Ascend 持续集成工作流
name: TileLang-Ascend CI

# 触发条件
on:
  push:
    branches:
      - ascendc_pto*                           # ascendc_pto 分支
    paths-ignore:                              # 以下路径的修改不触发 CI
      - '**.md'                                # Markdown 文件
      - 'docs/**'                              # 文档目录
      - 'images/**'                            # 图片目录

  pull_request:
    branches:
      - ascendc_pto*
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'

  # 手动触发（通过 GitHub Actions 页面点击）
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run benchmark tests'     # 是否运行测试
        required: false
        default: true
        type: boolean

  schedule:
    - cron: '0 18 * * *' # 每天 UTC 18:00 运行 (北京时间凌晨 2:00)

concurrency:
  # PR 场景：按 PR 分支名分组，同一 PR 的新 push 共享同一组
  # 手动/定时场景：head_ref 为空，退化为 github.run_id（每次唯一），互不干扰
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  # 同一组中有新运行时，自动取消旧的正在运行的 workflow 
  cancel-in-progress: true
  
jobs:
  test:
    name: Benchmark Tests (Ascend NPU)
    runs-on: [self-hosted, Linux, X64, ascend_910b] 
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests == 'true' }}
    timeout-minutes: 60            # 1小时超时失败
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Check if skip pytest
        id: check_skip_pytest
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          changed_files=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          
          skip_pytest=true
          
          for file in $changed_files; do
            if [[ ! "$file" =~ ^examples/ ]]; then
              echo "File outside examples/: $file"
              skip_pytest=false
              break
            fi
            if [[ ! "$file" =~ \.py$ ]] && [[ ! "$file" =~ \.md$ ]]; then
              echo "File type not allowed: $file"
              skip_pytest=false
              break
            fi
          done
          
          echo "skip_pytest=${skip_pytest}" >> $GITHUB_OUTPUT
          if [ "$skip_pytest" = true ]; then
            echo "Will skip pytest: only .py/.md files in examples/ modified"
          else
            echo "Will run full tests"
          fi

      - name: Build and Test in Local Container
        run: |
          SKIP_PYTEST_VALUE="${{ steps.check_skip_pytest.outputs.skip_pytest }}"
          echo "run in existed container..."
          docker exec \
            -w $GITHUB_WORKSPACE \
            -e GITHUB_ENV=$GITHUB_ENV \
            -e GITHUB_OUTPUT=$GITHUB_OUTPUT \
            -e BASH_ENV=/root/.bashrc \
            -e SKIP_PYTEST=$SKIP_PYTEST_VALUE \
            tilelang_x1 \
            bash -c "
              set -e
          
              # 1. 在容器内重新编译项目
              echo 'Building project...'
              bash install_ascend.sh

              # 2. 加载环境变量
              echo 'Sourcing environment...'
              source set_env.sh
              echo 'TILELANG_PATH='\$PWD >> \$GITHUB_ENV

              # 3. 运行测试用例
              cd examples
              chmod +x bench_test.sh
              echo 'Running benchmark tests...'
              
              if [ \"\$SKIP_PYTEST\" = true ]; then
                ./bench_test.sh --skip-pytest 2>&1 | tee test_output.log
              else
                ./bench_test.sh 2>&1 | tee test_output.log
              fi
              TEST_EXIT_CODE=\${PIPESTATUS[0]}

              echo 'Test exit code: '\$TEST_EXIT_CODE
              echo \"test_exit_code=\$TEST_EXIT_CODE\" >> \$GITHUB_OUTPUT
              
              # 如果测试失败，让脚本退出码非0
              if [ \"\$TEST_EXIT_CODE\" -ne 0 ]; then
                exit 1
              fi
            "

      - name: Check pass rate
        id: check_results
        run: |
          echo "Checking test results..."
          
          # 此时已经在宿主机上，且 checkout 的工作目录中已经生成了容器内的 log
          cd examples
          if [ -f test_output.log ]; then
            PASS_RATE_LINE=$(grep -i "Pass rate:" test_output.log || echo "")
            if [ -n "$PASS_RATE_LINE" ]; then             
              PASS_RATE=$(echo "$PASS_RATE_LINE" | grep -o '[0-9]*%' | tr -d '%')
              echo "Found Pass rate: ${PASS_RATE}%"
              echo "pass_rate=${PASS_RATE}" >> $GITHUB_OUTPUT
              
              if [ "$PASS_RATE" = "100" ]; then
                echo "✅ All tests passed (Pass rate: 100%)"
                echo "test_status=passed" >> $GITHUB_OUTPUT
              else
                echo "❌ Tests failed (Pass rate: ${PASS_RATE}%)"
                echo "test_status=failed" >> $GITHUB_OUTPUT
                echo "Failing step because Pass rate is not 100%"
                exit 1
              fi
            else
              echo "⚠️ Could not find 'Pass rate:' in test output"
              echo "pass_rate=0" >> $GITHUB_OUTPUT
              echo "test_status=error" >> $GITHUB_OUTPUT
              exit 1
            fi
            
            EXEC_SUMMARY=$(grep -i "Execution Summary" -A 2 test_output.log || echo "")
            if [ -n "$EXEC_SUMMARY" ]; then
              echo "Execution Summary:"
              echo "$EXEC_SUMMARY"
            fi
          else
            echo "⚠️ Test output file not found"
            echo "pass_rate=0" >> $GITHUB_OUTPUT
            echo "test_status=error" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            examples/test_results/
            examples/*.log
            examples/*.json
          retention-days: 30
