name: CI

on: [pull_request]

jobs:
  format-check:
    if: false
    runs-on: self-hosted
    env:
      UV_INDEX_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
      UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
      UV_INDEX_STRATEGY: "unsafe-best-match"
      UV_INSECURE_HOST: "cache-service.nginx-pypi-cache.svc.cluster.local"
      UV_HTTP_TIMEOUT: 120
      UV_NO_CACHE: 1
      UV_SYSTEM_PYTHON: 1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install uv
      run: python -m pip install uv

    - name: Create virtual environment
      run: python -m venv tilelang_ci

    - name: Activate virtual environment and install dependencies
      run: |
        source tilelang_ci/bin/activate
        if [ -f requirements-dev.txt ]; then uv pip install -r requirements-dev.txt; fi

    - name: Update submodules recursively
      run: git submodule update --init --recursive

    - name: Run format check
      run: |
        source tilelang_ci/bin/activate
        ./format.sh

  build-test:
    runs-on: self-hosted
    needs: format-check
    env:
      UV_INDEX_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
      UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
      UV_INDEX_STRATEGY: "unsafe-best-match"
      UV_INSECURE_HOST: "cache-service.nginx-pypi-cache.svc.cluster.local"
      UV_HTTP_TIMEOUT: 120
      UV_NO_CACHE: 1
      UV_SYSTEM_PYTHON: 1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install uv
      run: python -m pip install uv

    - name: Create virtual environment
      run: python -m venv tilelang_ci

    - name: Activate virtual environment and install dependencies
      run: |
        source tilelang_ci/bin/activate
        if [ -f requirements-test.txt ]; then uv pip install -r requirements-test.txt; fi

    - name: Install project in wheel mode
      run: |
        source tilelang_ci/bin/activate
        uv pip install .

    - name: Run examples
      run: |
        source tilelang_ci/bin/activate
        cd examples
        python -m pytest **/test*.py

    - name: Run tests
      run: |
        source tilelang_ci/bin/activate
        cd testing/python
        export TILELANG_CLEAR_CACHE=1
        python -m pytest
